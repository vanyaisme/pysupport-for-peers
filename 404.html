<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — peer-support.live</title>
  <link rel="canonical" href="https://peer-support.live/404" />
  <meta name="robots" content="noindex" />
</head>

<body style="
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background-color: #0f172a;
  color: #f1f5f9;
  font-family: system-ui, -apple-system, sans-serif;
  text-align: center;
  padding: 2rem;
  box-sizing: border-box;
">
  <main>
    <p style="
      font-size: 5rem;
      font-weight: 700;
      color: #E1A7A7;
      margin: 0 0 0.25rem;
      line-height: 1;
    ">404</p>
    <h1 style="
      font-size: 1.5rem;
      font-weight: 600;
      color: #f1f5f9;
      margin: 0 0 1rem;
    ">Page not found</h1>
    <p style="
      font-size: 1rem;
      color: #94a3b8;
      margin: 0 0 2rem;
    ">The page you&rsquo;re looking for doesn&rsquo;t exist.</p>
    <a href="https://github.com/vanyaisme/python-for-psychologists-notebooks"
      target="_blank" rel="noopener noreferrer"
      style="
      display: inline-block;
      color: #E1A7A7;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      border: 1px solid #E1A7A7;
      border-radius: 0.375rem;
      padding: 0.5rem 1.25rem;
      transition: background-color 0.15s ease, color 0.15s ease;
    "
    onmouseover="this.style.backgroundColor='#E1A7A7';this.style.color='#0f172a';"
    onmouseout="this.style.backgroundColor='transparent';this.style.color='#E1A7A7';"
    >Learn Offline &rarr;</a>
  </main>
</body>

</html>
